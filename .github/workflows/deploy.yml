name: Quantify OS Sovereign Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Oracle via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            if [ ! -d "~/quantify-os/.git" ]; then
              echo "Creating project directory..."
              git clone https://github.com/Akhil0ss/QuantifyOS.git ~/quantify-os
            fi
            cd ~/quantify-os
            git pull origin main
            docker-compose -f docker-compose.prod.yml up --build -d
            docker image prune -f

  deploy-frontends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # This step assumes Vercel CLI is configured in secrets
      - name: Deploy Dashboard to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_DASHBOARD_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

      - name: Deploy Admin to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_ID }}
          working-directory: ./admin-panel
          vercel-args: '--prod'
