services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantify-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/workspaces:/app/workspaces
      - ./backend/backups:/app/backups
    environment:
      - QUANTIFY_ENV=production
    networks:
      - quantify-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantify-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    networks:
      - quantify-network

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: quantify-admin
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    networks:
      - quantify-network

networks:
  quantify-network:
    driver: bridge
