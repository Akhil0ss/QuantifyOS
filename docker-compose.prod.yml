services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - QUANTIFY_ENV=production
    ports:
      - "80:8000"
    volumes:
      - ./workspaces:/app/workspaces
      - ./backups:/app/backups
      - ./sessions:/app/sessions
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    deploy:
      resources:
        limits:
          memory: 800M
