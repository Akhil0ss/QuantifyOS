services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
    ports:
      - "80:8000"
    volumes:
      - ./workspaces:/app/workspaces
      - ./backups:/app/backups
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    deploy:
      resources:
        limits:
          memory: 800M # Hard limit to prevent crashing the 1GB instance

# Caddy is handled via the host service for maximum performance
