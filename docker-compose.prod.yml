version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CONFIG=${FIREBASE_CONFIG}
      - ENV=production
    ports:
      - "8000:8000"
    volumes:
      - ~/quantify-os/workspaces:/app/workspaces
      - ~/quantify-os/backups:/app/backups
    deploy:
      resources:
        limits:
          memory: 800M # Hard limit to prevent crashing the 1GB instance

# Caddy is handled via the host service for maximum performance
