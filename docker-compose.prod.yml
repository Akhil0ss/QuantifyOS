services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - QUANTIFY_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - ./workspaces:/app/workspaces
      - ./backups:/app/backups
      - ./sessions:/app/sessions
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    deploy:
      resources:
        limits:
          memory: 400M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    deploy:
      resources:
        limits:
          memory: 300M

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    deploy:
      resources:
        limits:
          memory: 200M
